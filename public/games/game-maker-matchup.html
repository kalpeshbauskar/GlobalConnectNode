<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Maker Match-Up!</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;800&display=swap');

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: #87CEEB;
            background-image: radial-gradient(#ffffff 20%, transparent 20%), radial-gradient(#ffffff 20%, transparent 20%);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 20px;
            margin: 0;
            height: 100vh;
            overflow: hidden;
        }

        h1 {
            font-family: 'Fredoka One', cursive;
            color: #ff5722;
            text-align: center;
            font-size: 2.2rem;
            text-shadow: 2px 2px 0px #fff, 4px 4px 0px #ffb74d;
            margin: 5px 0 10px 0;
            letter-spacing: 1px;
        }

        .instructions {
            text-align: center;
            background: #fff;
            padding: 8px 20px;
            border-radius: 15px;
            border: 3px dashed #ff9800;
            color: #444;
            font-size: 1.1rem;
            font-weight: 800;
            margin-bottom: 15px;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
        }

        .game-board {
            display: flex;
            gap: 30px;
            max-width: 900px;
            width: 100%;
            height: calc(100vh - 140px);
            justify-content: center;
            align-items: stretch;
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex: 1;
            justify-content: space-evenly;
        }

        .draggable {
            background-color: #ffe066;
            color: #d35400;
            border: 3px solid #f39c12;
            padding: 12px;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: 800;
            text-align: center;
            cursor: grab;
            box-shadow: 0 4px 0 #d35400;
            transition: transform 0.1s;
        }

        .draggable:active {
            cursor: grabbing;
            transform: scale(0.95);
            box-shadow: 0 2px 0 #d35400;
        }

        .dropzone-container {
            display: flex;
            align-items: center;
            background-color: #fff;
            border: 3px solid #4ecdc4;
            border-radius: 12px;
            padding: 8px;
            box-shadow: 0 4px 0 #16a085;
            min-height: 65px;
        }

        .dropzone {
            width: 150px;
            min-height: 45px;
            background-color: #e0f7fa;
            border: 2px dashed #00bcd4;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 12px;
            transition: all 0.3s ease;
        }

        .dropzone.hover {
            background-color: #b2ebf2;
            transform: scale(1.02);
            border-style: solid;
        }

        .def-text {
            flex: 1;
            font-size: 0.95rem;
            font-weight: 800;
            color: #2c3e50;
            line-height: 1.3;
        }

        .correct-drop {
            background-color: #a8e6cf !important;
            border-color: #27ae60 !important;
            color: #27ae60;
            box-shadow: none;
            cursor: default;
        }

        .win-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #fff;
            padding: 30px;
            border-radius: 20px;
            border: 5px solid #ff4757;
            box-shadow: 0 10px 0 rgba(0,0,0,0.1);
            text-align: center;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            height: calc(100vh - 140px);
            width: 100%;
            max-width: 600px;
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .win-screen h2 {
            font-family: 'Fredoka One', cursive;
            color: #ff4757;
            font-size: 2.5rem;
            margin: 0 0 10px 0;
        }

        .win-screen p {
            font-size: 1.2rem; 
            font-weight: 800; 
            color: #555;
            margin-bottom: 20px;
        }

        .restart-btn {
            padding: 12px 30px;
            background-color: #2ed573;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.3rem;
            font-family: 'Fredoka One', cursive;
            cursor: pointer;
            box-shadow: 0 6px 0 #20bf6b;
            transition: all 0.1s;
        }
        
        .restart-btn:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 #20bf6b;
        }

        #confetti {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
            display: none;
        }
    </style>
</head>
<body>

    <canvas id="confetti"></canvas>

    <h1>🎮 Game Maker Match-Up! 🎮</h1>
    <div class="instructions">
        Drag the tech words into the empty boxes next to their simple meaning! ✨
    </div>

    <div class="game-board" id="gameBoard">
        <div class="column" id="termsColumn">
            <div class="draggable" draggable="true" id="term-1" data-id="1">The Goal 🏆</div>
            <div class="draggable" draggable="true" id="term-2" data-id="2">The Rules 🛑</div>
            <div class="draggable" draggable="true" id="term-3" data-id="3">Mechanics 🕹️</div>
            <div class="draggable" draggable="true" id="term-4" data-id="4">Core Loop 💓</div>
            <div class="draggable" draggable="true" id="term-5" data-id="5">Feedback System ⭐</div>
        </div>

        <div class="column" id="defsColumn">
            </div>
    </div>

    <div class="win-screen" id="winScreen">
        <h2>LEVEL BEATEN! 🎉</h2>
        <p>You know the real tech words to make a fun game!</p>
        <button class="restart-btn" onclick="location.reload()">Play Again!</button>
    </div>

    <script>
        const definitions = [
            { id: "1", text: "What you want to win! (Like saving the world or getting the highest score)." },
            { id: "2", text: "What you are allowed to do, and what you are NOT allowed to do." },
            { id: "3", text: "What your character can actually do, like jumping, running, or throwing a magic spell." },
            { id: "4", text: "The fun thing you do over and over! (Like: run ➔ collect coins ➔ level up)." },
            { id: "5", text: "How the game says 'Good job!' (Like seeing your score go up or hearing a happy sound)." }
        ];

        let score = 0;

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        const defsColumn = document.getElementById('defsColumn');
        const shuffledDefs = shuffle([...definitions]);

        shuffledDefs.forEach(def => {
            const container = document.createElement('div');
            container.className = 'dropzone-container';
            
            const dropzone = document.createElement('div');
            dropzone.className = 'dropzone';
            dropzone.dataset.id = def.id;
            
            const text = document.createElement('div');
            text.className = 'def-text';
            text.textContent = def.text;

            container.appendChild(dropzone);
            container.appendChild(text);
            defsColumn.appendChild(container);
        });

        const draggables = document.querySelectorAll('.draggable');
        const dropzones = document.querySelectorAll('.dropzone');

        draggables.forEach(draggable => {
            draggable.addEventListener('dragstart', (e) => {
                e.dataTransfer.setData('text/plain', draggable.id);
                setTimeout(() => draggable.style.opacity = '0.5', 0);
            });

            draggable.addEventListener('dragend', () => {
                draggable.style.opacity = '1';
            });
        });

        dropzones.forEach(zone => {
            zone.addEventListener('dragover', (e) => {
                e.preventDefault();
                zone.classList.add('hover');
            });

            zone.addEventListener('dragleave', () => {
                zone.classList.remove('hover');
            });

            zone.addEventListener('drop', (e) => {
                e.preventDefault();
                zone.classList.remove('hover');
                
                const draggedId = e.dataTransfer.getData('text/plain');
                const draggedElement = document.getElementById(draggedId);
                const termId = draggedElement.dataset.id;
                const zoneId = zone.dataset.id;

                if (termId === zoneId) {
                    zone.appendChild(draggedElement);
                    draggedElement.style.boxShadow = "none";
                    draggedElement.style.margin = "0";
                    draggedElement.style.width = "100%";
                    draggedElement.style.padding = "6px";
                    draggedElement.style.fontSize = "1rem";
                    draggedElement.draggable = false;
                    zone.style.border = "none";
                    
                    score++;
                    checkWin();
                } else {
                    zone.style.backgroundColor = "#ffcccc";
                    zone.style.borderColor = "#ff4757";
                    setTimeout(() => {
                        zone.style.backgroundColor = "#e0f7fa";
                        zone.style.borderColor = "#00bcd4";
                    }, 500);
                }
            });
        });

        function checkWin() {
            if (score === 5) {
                setTimeout(() => {
                    document.getElementById('gameBoard').style.display = 'none';
                    document.getElementById('winScreen').style.display = 'flex';
                    document.getElementById('confetti').style.display = 'block';
                    fireConfetti();
                }, 400);
            }
        }

        function fireConfetti() {
            const canvas = document.getElementById('confetti');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const pieces = [];
            for(let i=0; i<80; i++) {
                pieces.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    size: Math.random() * 12 + 5,
                    speedY: Math.random() * 4 + 2,
                    speedX: Math.random() * 4 - 2,
                    color: `hsl(${Math.random() * 360}, 100%, 50%)`
                });
            }

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                pieces.forEach(p => {
                    ctx.fillStyle = p.color;
                    ctx.fillRect(p.x, p.y, p.size, p.size);
                    p.y += p.speedY;
                    p.x += p.speedX;
                    if(p.y > canvas.height) p.y = -20;
                });
                requestAnimationFrame(draw);
            }
            draw();
        }
    </script>
    <script>
    (function(){
      var lastH=0;
      function sendHeight(){
        try{
          var d=document, b=d.body, e=d.documentElement;
          var h=Math.max(
            b?b.scrollHeight:0, b?b.offsetHeight:0,
            e?e.scrollHeight:0, e?e.offsetHeight:0, e?e.clientHeight:0
          );
          if(h && Math.abs(h-lastH)>1){
            lastH=h;
            parent.postMessage({gcGameHeight:h}, '*');
          }
        }catch(err){}
      }
      window.addEventListener('load', sendHeight);
      window.addEventListener('resize', sendHeight);
      document.addEventListener('DOMContentLoaded', sendHeight);
      if(window.ResizeObserver){
        try{ new ResizeObserver(sendHeight).observe(document.documentElement); }catch(err){}
      }
      if(window.MutationObserver){
        try{
          new MutationObserver(sendHeight).observe(document.documentElement, {childList:true, subtree:true, attributes:true});
        }catch(err){}
      }
      for(var i=1;i<=20;i++){ setTimeout(sendHeight, i*150); }
      setInterval(sendHeight, 600);
    })();
    </script>
</body>
</html>
